name: CI

on:
  push:
    branches: [master]
    # Doc-only / metadata-only pushes don't need CI. The build + tests are agnostic to
    # CHANGELOG / README / docs / LICENSE / .gitignore content, so excluding them here
    # avoids burning runner minutes on prose edits (and the "publish 0.1.x" flow which
    # only touches CHANGELOG.md goes through without a green-checkmark wait).
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15
    # Manual opt-out for noisy WIP pushes: include [skip-ci-only] anywhere in the commit
    # message and the whole job is skipped. PRs always run regardless of the title so
    # the safety net stays for anything review-worthy.
    #
    # NOT [skip ci] / [ci skip] / [skip actions] — those are GitHub Actions reserved
    # keywords that skip EVERY workflow on the push, including release.yml when a tag
    # points at this commit. The release workflow MUST fire even when ci.yml is
    # opted out, so we use a custom marker GitHub doesn't recognise.
    if: github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip-ci-only]')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AresToys.sln

      - name: Build
        run: dotnet build AresToys.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AresToys.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: '**/TestResults/*.trx'
