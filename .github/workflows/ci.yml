name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      # Opt JS-based actions onto Node 24 ahead of GitHub's deprecation of Node 20 (forced flip
      # 2026-06-02, full removal 2026-09-16). Silences the deprecation warning + surfaces any
      # Node 24 incompat now rather than at the deadline.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ShareQ.sln

      - name: Build
        run: dotnet build ShareQ.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ShareQ.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
